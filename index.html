<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'><title>QUANTUM LATTICE | ELITE UNIT</title>
<link href='https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Michroma&family=Syncopate:wght@700&display=swap' rel='stylesheet'>
<style>
:root{ --p:#00ff75; --s:#00f2ff; --bg:#000; --blur:25px; }
body,html{ margin:0; background:#000; color:#fff; font-family:'Michroma'; overflow:hidden; height:100%; }
canvas{ position:fixed; inset:0; z-index:1; opacity:0.4; mix-blend-mode: screen; }

/* 3D PERSPECTIVE GRID */
.grid-floor{ position:fixed; inset:0; background-image:
    linear-gradient(var(--p) 1px, transparent 1px),
    linear-gradient(90deg, var(--p) 1px, transparent 1px);
    background-size: 60px 60px; transform: perspective(500px) rotateX(65deg) translateY(-100px);
    opacity: 0.1; z-index:0; animation: moveGrid 8s infinite linear; }
@keyframes moveGrid { from { background-position: 0 0; } to { background-position: 0 600px; } }

/* PREMIUM HUD */
.elite-hud{ position:fixed; top:40px; left:40px; z-index:100; border-left:2px solid var(--s); padding-left:20px; background:rgba(0,0,0,0.8); backdrop-filter:blur(10px); }
.unit-tag{ font-family:'Syncopate'; font-weight:700; font-size:10px; color:var(--s); letter-spacing:5px; margin-bottom:5px; }
.valuation{ font-family:'Orbitron'; font-size:24px; font-weight:900; color:#fff; }

/* 3D UNIT STAGE */
.stage{ position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); width:500px; height:500px; display:flex; align-items:center; justify-content:center; perspective:1000px; z-index:10; }
.lattice-cube{ width:250px; height:250px; position:relative; transform-style:preserve-3d; animation: rotateLattice 15s infinite linear; }
.face{ position:absolute; inset:0; border:1px solid var(--s); background:rgba(0,242,255,0.05); box-shadow: 0 0 40px rgba(0,242,255,0.2); backdrop-filter:blur(5px); }
.f1 { transform: rotateY(0deg) translateZ(125px); }
.f2 { transform: rotateY(90deg) translateZ(125px); }
.f3 { transform: rotateY(180deg) translateZ(125px); }
.f4 { transform: rotateY(-90deg) translateZ(125px); }
.f5 { transform: rotateX(90deg) translateZ(125px); }
.f6 { transform: rotateX(-90deg) translateZ(125px); }

@keyframes rotateLattice {
    from{ transform: rotateX(0) rotateY(0) rotateZ(0); }
    to{ transform: rotateX(360deg) rotateY(720deg) rotateZ(360deg); }
}

.reserve-panel{ position:fixed; bottom:50px; right:50px; z-index:100; }
.buy-btn{ background:var(--s); color:#000; border:none; padding:20px 60px; font-family:'Orbitron'; font-weight:900; letter-spacing:5px; cursor:pointer; clip-path: polygon(5% 0, 100% 0, 95% 100%, 0% 100%); transition:0.4s; }
.buy-btn:hover{ box-shadow:0 0 60px var(--s); transform:scale(1.1); }
</style>
</head>
<body>
<div class='grid-floor'></div>
<canvas id='c'></canvas>
<div class='elite-hud'>
    <div class='unit-tag'>RESERVE_UNIT: 0x-99</div>
    <div class='valuation'>$12,499.00</div>
    <div style='font-size:8px; opacity:0.5; margin-top:5px;'>NODE: ELITE_QUANTUM_LATTICE_V141</div>
</div>
<div class='stage'>
    <div class='lattice-cube'>
        <div class='face f1'></div><div class='face f2'></div>
        <div class='face f3'></div><div class='face f4'></div>
        <div class='face f5'></div><div class='face f6'></div>
    </div>
    <h1 style='position:absolute; font-family:Orbitron; letter-spacing:25px; opacity:0.1; font-size:5rem;'>LATTICE</h1>
</div>
<div class='reserve-panel'><button class='buy-btn' onclick='alert("Handshake Initiated.")'>RESERVE_UNIT</button></div>
<script>
const canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
let w,h,t=0; function res(){ w=canvas.width=innerWidth; h=canvas.height=innerHeight; } res();
window.addEventListener('resize', res);
function draw(){
    t+=0.01; ctx.fillStyle='rgba(0,0,0,0.15)'; ctx.fillRect(0,0,w,h);
    ctx.strokeStyle='var(--s)'; ctx.lineWidth=0.5;
    for(let i=0; i<5; i++){
        ctx.beginPath(); ctx.arc(w/2, h/2, 150+i*40+Math.sin(t+i)*30, 0, Math.PI*2); ctx.stroke();
    }
    requestAnimationFrame(draw);
} draw();
</script></body></html>
